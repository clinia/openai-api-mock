name: Build containers

on:
  pull_request:
  push:
    branches:
      - dev
    tags:
      - v*

env:
  OPENAI_MOCK_IMAGE: ghcr.io/clinia/openai-api-mock

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true

    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.OPENAI_MOCK_IMAGE }}
          tags: |
            type=edge
            type=sha,event=branch,prefix=edge-,suffix=-{{date 'YYYYMMDDHHmmss'}},format=short
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Github Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CLINIA_CI_GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.OPENAI_MOCK_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          secrets: |
            "npm_token=${{ secrets.CLINIA_CI_GITHUB_TOKEN }}"
          cache-from: type=registry,ref=user/app:latest
          cache-to: type=inline

  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare
        id: prep
        run: |
          DOCKER_IMAGE=${{ env.OPENAI_MOCK_IMAGE }}
          VERSION=edge
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          TAGS="${DOCKER_IMAGE}:${VERSION}"
          if [[ $VERSION =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(?:-([0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*))?(?:\+[0-9A-Za-z-]+)?$ ]]; then
            TAGS="$TAGS,${DOCKER_IMAGE}:latest"
          fi
          if [[ $VERSION == "edge" ]]; then
            VERSION="edge-${GITHUB_SHA::8}-$(date +%s)"
            TAGS="$TAGS,${DOCKER_IMAGE}:${VERSION}"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: clinia-ci
          password: ${{ secrets.CLINIA_CI_GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          outputs: type=image,name=${{ env.OPENAI_MOCK_IMAGE }},name-canonical=true,push=true
          secrets: |
            "npm_token=${{ secrets.CLINIA_CI_GITHUB_TOKEN }}"
          cache-from: type=registry,ref=user/app:latest
          cache-to: type=inline
