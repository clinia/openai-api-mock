name: Build containers

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - v*

env:
  OPENAI_MOCK_IMAGE: ghcr.io/clinia/openai-api-mock

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true

    name: Build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.OPENAI_MOCK_IMAGE }}
          tags: |
            type=edge
            type=sha,event=branch,prefix=edge-,suffix=-{{date 'YYYYMMDDHHmmss'}},format=short
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Github Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CLINIA_CI_GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.OPENAI_MOCK_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          secrets: |
            "npm_token=${{ secrets.CLINIA_CI_GITHUB_TOKEN }}"
          cache-from: type=registry,ref=user/app:latest
          cache-to: type=inline

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.OPENAI_MOCK_IMAGE }}
          tags: |
            type=edge
            type=sha,event=branch,prefix=edge-,suffix=-{{date 'YYYYMMDDHHmmss'}},format=short
            type=semver,pattern={{version}}
      - name: Login to Github Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CLINIA_CI_GITHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.OPENAI_MOCK_IMAGE }}@sha256:%s ' *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.OPENAI_MOCK_IMAGE }}:${{ steps.meta.outputs.version }}
